services:
  hermes-webui:
    image: ${WEBUI_IMAGE:-ghcr.io/kedaya2025/hermes-webui-lite:main}
    container_name: ${WEBUI_CONTAINER_NAME:-hermes-webui}
    ports:
      - "${PORT:-6060}:${PORT:-6060}"
      - "${XAI_OAUTH_PORT:-56121}:56121"
    volumes:
      - /root/.hermes:/home/agent/.hermes
      - /root/.hermes-web-ui:/home/agent/.hermes-web-ui
    environment:
      - PORT=${PORT:-6060}
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - HERMES_ALLOW_ROOT_GATEWAY=1
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - default
      - proxy-network

networks:
  proxy-network:
    external: true
